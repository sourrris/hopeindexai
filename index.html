<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HopeIndexAI</title>
  <meta name="description" content="Real-time geopolitical event intelligence powered by GDELT." />

  <!-- Geist Sans + Mono -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans@5/index.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono@5/index.min.css" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* ── Tokens — forced white, no dark mode ─────────────────────────────── */
    :root {
      --font-sans: "Geist Sans", "GeistSans", system-ui, sans-serif;
      --font-mono: "Geist Mono", "GeistMono", ui-monospace, monospace;

      --bg:          #FFFFFF;
      --surface:     #FAFAFA;
      --surface-hi:  #F5F5F5;
      --border:      #EBEBEB;
      --border-hi:   #D8D8D8;
      --text:        #0A0A0A;
      --text-sec:    #6B6B6B;
      --text-muted:  #B0B0B0;
      --panel:       rgba(255,255,255,0.97);
      --topbar-bg:   rgba(255,255,255,0.99);
      --shadow:      0 2px 16px rgba(0,0,0,0.06);
      --shadow-md:   0 4px 32px rgba(0,0,0,0.10);
      --shadow-lg:   0 8px 48px rgba(0,0,0,0.14);

      --doom-hi:     #FF1A1A;
      --doom-mid:    #FF7A00;
      --doom-lo:     #FFBE00;
      --bloom:       #06B6D4;
      --bloom-br:    #22C55E;
      --live:        #22C55E;
    }

    /* ── Reset ───────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    body { font-family: var(--font-sans); color: var(--text); font-size: 13px; line-height: 1.5; }
    button { font-family: inherit; }
    a { color: inherit; text-decoration: none; }

    /* ── Shell ───────────────────────────────────────────────────────────── */
    #root { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Top bar ─────────────────────────────────────────────────────────── */
    .topbar {
      position: relative;
      display: flex; align-items: center; justify-content: space-between;
      height: 58px; padding: 0 20px;
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 1200;
      gap: 16px;
    }
    /* Doom-to-bloom accent stripe at the bottom of topbar */
    .topbar::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        var(--doom-mid) 12%,
        var(--doom-lo) 38%,
        #DDDDD 50%,
        var(--bloom) 62%,
        var(--bloom-br) 88%,
        transparent 100%
      );
      opacity: 0.55;
      z-index: 1;
    }

    .topbar-brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--text);
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .brand-suffix {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      vertical-align: super;
      margin-left: 2px;
    }

    .topbar-center {
      display: flex; align-items: center; gap: 10px;
      flex: 1; justify-content: center; flex-shrink: 0;
      overflow: hidden;
    }
    .live-badge {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 100px;
      background: var(--surface); border: 1px solid var(--border);
      font-size: 10px; font-family: var(--font-mono); font-weight: 700;
      letter-spacing: 0.1em; color: var(--text-sec);
      white-space: nowrap; flex-shrink: 0;
    }
    .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--live); flex-shrink: 0;
      animation: live-pulse 2s ease-in-out infinite;
    }
    .topbar-stats {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-family: var(--font-mono);
      color: var(--text-muted);
    }
    .stat-pill {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px;
      font-size: 10px; font-weight: 600;
      white-space: nowrap;
    }
    .stat-pill.hope  { background: linear-gradient(135deg, rgba(6,182,212,.08) 0%, rgba(34,197,94,.08) 100%); color: #16A34A; border: 1px solid rgba(34,197,94,.2); }
    .stat-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
    .stat-dot.hope  { background: linear-gradient(135deg, #06B6D4, #22C55E); }

    .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .gh-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 8px; border: none;
      background: #0A0A0A; color: #FFFFFF;
      font-size: 11px; font-weight: 600; letter-spacing: -0.01em;
      text-decoration: none; cursor: pointer;
      animation: btn-pulse 3s ease-in-out infinite;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .gh-btn:hover { opacity: 0.8; }
    .gh-btn svg { flex-shrink: 0; }

    /* ── Main ────────────────────────────────────────────────────────────── */
    .app-main { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    #map { width: 100%; height: 100%; }

    /* ── Filter panel — z-index > 1000 to clear ALL Leaflet layers ───────── */
    .filter-panel {
      position: absolute; top: 12px; left: 12px;
      z-index: 1100;                     /* above leaflet-top (z:1000) */
      width: 272px; max-height: calc(100% - 24px);
      background: var(--panel);
      border: 1px solid var(--border-hi); border-radius: 14px;
      box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .filter-panel.collapsed { width: 44px; }
    .filter-panel.collapsed .filter-body { display: none; }

    .filter-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 13px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; cursor: pointer; user-select: none;
    }
    .filter-head-left { display: flex; align-items: center; gap: 8px; }
    .filter-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-sec);
    }
    .filter-count-badge {
      font-family: var(--font-mono); font-size: 10px;
      padding: 1px 6px; border-radius: 4px;
      background: var(--surface-hi); border: 1px solid var(--border);
      color: var(--text-sec);
    }
    .filter-toggle-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); display: flex; align-items: center;
      padding: 2px; border-radius: 4px; transition: color 0.1s;
    }
    .filter-toggle-btn:hover { color: var(--text); }

    .filter-body { overflow-y: auto; flex: 1; min-height: 0; padding-bottom: 4px; }
    .filter-group { padding: 12px 13px 2px; }
    .filter-group-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px;
    }
    .chip-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip {
      padding: 3px 9px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-sec); font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all 0.1s; white-space: nowrap;
    }
    .chip:hover { border-color: var(--border-hi); color: var(--text); }
    .chip.on { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* Event list */
    .elist-header {
      padding: 8px 13px 5px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted);
      border-top: 1px solid var(--border); margin-top: 4px;
    }
    .elist { overflow-y: auto; max-height: 240px; }
    .erow {
      display: flex; align-items: flex-start; gap: 9px;
      padding: 8px 13px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .erow:hover, .erow.sel { background: var(--surface); }
    .edot {
      width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0; margin-top: 5px;
    }
    .edot.Diplomacy     { background: #4F46E5; }
    .edot.Conflict      { background: #EF4444; }
    .edot.Econ          { background: #D97706; }
    .edot.Environment   { background: #10B981; }
    .edot.Humanitarian  { background: #D946EF; }
    .edot.Science       { background: #06B6D4; }
    .erow-body { flex: 1; min-width: 0; }
    .erow-title {
      font-size: 11px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
    }
    .erow-meta {
      font-size: 10px; color: var(--text-muted);
      font-family: var(--font-mono); margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .sev-badge {
      font-size: 8px; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; padding: 1px 5px; border-radius: 3px;
      flex-shrink: 0; margin-top: 3px; font-family: var(--font-mono);
    }
    .sev-low      { background: rgba(255,190,0,.12);  color: #CC9200; }
    .sev-medium   { background: rgba(255,122,0,.12);  color: #CC5500; }
    .sev-high     { background: rgba(255,26,26,.12);  color: #CC0000; }
    .sev-critical { background: rgba(192,0,10,.14);   color: #8C0008; }
    .load-more {
      width: 100%; padding: 9px; background: none; border: none;
      border-top: 1px solid var(--border); color: var(--text-muted);
      font-size: 10px; cursor: pointer; transition: color 0.1s;
      font-family: var(--font-mono);
    }
    .load-more:hover { color: var(--text); }

    /* ── SVG pulse rings (top 5 doom — circleMarker, compositor-only) ─────── */
    .pulse-ring-svg {
      transform-box: fill-box;
      transform-origin: center;
      animation: ring-expand 2s ease-out infinite;
      pointer-events: none;
    }
    @keyframes ring-expand {
      0%   { transform: scale(1);   opacity: 0.7; }
      100% { transform: scale(3.2); opacity: 0;   }
    }

    /* ── Event detail ────────────────────────────────────────────────────── */
    .detail-backdrop {
      position: fixed; inset: 0; z-index: 1300;
      background: rgba(0,0,0,0.18);
      animation: fade-in 0.18s ease;
    }
    .detail-panel {
      position: fixed; top: 0; right: 0; bottom: 0;
      width: min(440px, 100vw); z-index: 1301;
      background: var(--bg); border-left: 1px solid var(--border-hi);
      overflow-y: auto;
      animation: slide-right 0.24s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: -8px 0 48px rgba(0,0,0,0.12);
    }
    .detail-bar { height: 3px; flex-shrink: 0; }
    .detail-bar.Diplomacy     { background: linear-gradient(90deg, #4F46E5, #818CF8); }
    .detail-bar.Conflict      { background: linear-gradient(90deg, #EF4444, #F87171); }
    .detail-bar.Econ          { background: linear-gradient(90deg, #D97706, #FBBF24); }
    .detail-bar.Environment   { background: linear-gradient(90deg, #10B981, #34D399); }
    .detail-bar.Humanitarian  { background: linear-gradient(90deg, #D946EF, #F472B6); }
    .detail-bar.Science       { background: linear-gradient(90deg, #06B6D4, #22D3EE); }
    .detail-close {
      position: absolute; top: 13px; right: 15px;
      background: none; border: none; font-size: 18px; line-height: 1;
      cursor: pointer; color: var(--text-muted); transition: color 0.1s;
    }
    .detail-close:hover { color: var(--text); }
    .detail-body { padding: 18px 22px 36px; }
    .detail-cat {
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; font-family: var(--font-mono); margin-bottom: 6px;
    }
    .detail-cat.Diplomacy     { color: #4F46E5; }
    .detail-cat.Conflict      { color: #EF4444; }
    .detail-cat.Econ          { color: #D97706; }
    .detail-cat.Environment   { color: #10B981; }
    .detail-cat.Humanitarian  { color: #D946EF; }
    .detail-cat.Science       { color: #06B6D4; }
    .detail-title {
      font-size: 16px; font-weight: 600; line-height: 1.35;
      margin-bottom: 22px; color: var(--text);
    }
    .detail-fields { display: flex; flex-direction: column; gap: 16px; }
    .dfield-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 3px;
    }
    .dfield-val {
      font-size: 12px; color: var(--text); font-family: var(--font-mono);
    }
    .goldstein-track {
      height: 3px; background: var(--surface-hi); border-radius: 2px;
      margin-top: 6px; overflow: hidden;
    }
    .goldstein-fill { height: 100%; border-radius: 2px; }
    .goldstein-fill.doom  { background: linear-gradient(90deg, var(--doom-hi), var(--doom-lo)); }
    .goldstein-fill.bloom { background: linear-gradient(90deg, var(--bloom), var(--bloom-br)); }
    .detail-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 24px; padding: 9px 14px; border-radius: 8px;
      border: 1px solid var(--border-hi); background: var(--surface);
      color: var(--text); font-size: 11px; font-weight: 500;
      transition: all 0.15s;
    }
    .detail-link:hover { background: var(--text); color: var(--bg); }

    .intel-packet {
      margin-top: 18px;
      border: 1px solid var(--border-hi);
      border-radius: 8px;
      background: var(--bg);
      overflow: hidden;
    }
    .intel-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 13px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .intel-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--font-mono);
      color: var(--text-sec);
    }
    .intel-sub {
      margin-top: 3px;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.35;
      max-width: 300px;
    }
    .intel-status {
      flex-shrink: 0;
      padding: 3px 7px;
      border-radius: 4px;
      border: 1px solid var(--border-hi);
      background: #FFFFFF;
      color: var(--text-sec);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .intel-status.strong { color: #047857; border-color: rgba(16,185,129,.35); background: rgba(16,185,129,.08); }
    .intel-status.partial { color: #B45309; border-color: rgba(217,119,6,.30); background: rgba(217,119,6,.08); }
    .intel-status.thin, .intel-status.weak { color: #B91C1C; border-color: rgba(239,68,68,.30); background: rgba(239,68,68,.08); }
    .intel-muted {
      padding: 12px 13px;
      font-size: 11px;
      line-height: 1.55;
      color: var(--text-sec);
    }
    .intel-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0;
    }
    .intel-block {
      padding: 12px 13px;
      border-bottom: 1px solid var(--border);
    }
    .intel-block:last-child { border-bottom: 0; }
    .intel-block-label {
      margin-bottom: 8px;
      font-size: 9px;
      font-family: var(--font-mono);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .model-prediction {
      background: #FFFFFF;
    }
    .model-risk-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    .model-risk-value {
      font-size: 28px;
      line-height: 1;
      font-family: var(--font-mono);
      font-weight: 800;
      color: #D97706;
    }
    .model-risk-value.low { color: #10B981; }
    .model-risk-value.elevated { color: #D97706; }
    .model-risk-value.high { color: #EF4444; }
    .model-risk-sub {
      margin-top: 4px;
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-family: var(--font-mono);
    }
    .model-metrics {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-sec);
    }
    .model-metrics span {
      padding: 2px 6px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--surface);
    }
    .model-driver-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .model-driver {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: 6px 7px;
      border-radius: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 10px;
      line-height: 1.3;
      color: var(--text-sec);
    }
    .model-driver span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .model-driver strong {
      flex-shrink: 0;
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--text);
      text-transform: uppercase;
    }
    .impact-bars {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .impact-row-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
      font-size: 11px;
      color: var(--text-sec);
    }
    .impact-row-top span:last-child {
      font-family: var(--font-mono);
      color: var(--text-muted);
    }
    .impact-track {
      height: 5px;
      border-radius: 999px;
      background: var(--surface-hi);
      overflow: hidden;
    }
    .impact-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: #D97706;
    }
    .impact-fill.negative { background: #EF4444; }
    .impact-fill.mixed { background: #D97706; }
    .impact-fill.positive { background: #10B981; }
    .hypothesis-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hypothesis-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      line-height: 1.35;
      color: var(--text-sec);
    }
    .hypothesis-row strong {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text);
    }
    .actor-game-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 5px;
    }
    .actor-game-line {
      font-size: 11px;
      line-height: 1.55;
      color: var(--text-sec);
    }
    .actor-game-line.muted { color: var(--text-muted); }
    .watchlist {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .watch-item {
      font-size: 11px;
      line-height: 1.45;
      color: var(--text-sec);
      padding-left: 10px;
      border-left: 2px solid var(--border-hi);
    }
    .intel-warning {
      padding: 10px 13px;
      border-top: 1px solid rgba(217,119,6,.18);
      background: rgba(217,119,6,.06);
      color: #92400E;
      font-size: 10px;
      line-height: 1.45;
    }

    .linked-signals {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      overflow: hidden;
    }
    .linked-signals-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 13px;
      border-bottom: 1px solid var(--border);
    }
    .linked-signals-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: var(--font-mono);
      color: var(--text-sec);
    }
    .linked-signals-sub {
      margin-top: 2px;
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.35;
    }
    .linked-signals-count {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid var(--border-hi);
      color: var(--text-sec);
      flex-shrink: 0;
    }
    .linked-signals-list {
      display: flex;
      flex-direction: column;
    }
    .linked-signal {
      width: 100%;
      display: grid;
      grid-template-columns: 7px 1fr auto;
      align-items: flex-start;
      gap: 9px;
      padding: 10px 13px;
      border: 0;
      border-bottom: 1px solid var(--border);
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: left;
    }
    .linked-signal:last-child { border-bottom: 0; }
    .linked-signal:hover { background: var(--bg); }
    .linked-signal-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-top: 5px;
    }
    .linked-signal-main {
      display: flex;
      flex-direction: column;
      min-width: 0;
      gap: 2px;
    }
    .linked-signal-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .linked-signal-meta {
      font-size: 10px;
      font-family: var(--font-mono);
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .linked-signal-reason {
      font-size: 10px;
      color: var(--text-sec);
      line-height: 1.4;
    }
    .linked-signal-score {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ── AI analysis section (inside EventDetail) ───────────────────────── */
    .ai-divider {
      margin: 28px 0 0;
      border-top: 1px solid var(--border);
    }
    .ai-section {
      padding-top: 20px;
    }
    .ai-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .ai-section-label {
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; font-family: var(--font-mono);
      color: var(--text-muted);
    }
    .ai-run-btn {
      font-family: var(--font-sans); font-size: 11px; font-weight: 600;
      padding: 5px 12px; border-radius: 6px; cursor: pointer;
      background: var(--text); color: var(--bg); border: none;
      transition: opacity 0.15s;
    }
    .ai-run-btn:hover  { opacity: 0.80; }
    .ai-run-btn:disabled { opacity: 0.45; cursor: default; }
    .ai-rerun-btn {
      font-family: var(--font-mono); font-size: 14px;
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); transition: color 0.15s; padding: 2px 4px;
    }
    .ai-rerun-btn:hover { color: var(--text); }
    .ai-thinking {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-sec); font-family: var(--font-mono);
    }
    .ai-thinking-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-sec);
      animation: ai-pulse 1.2s ease-in-out infinite;
    }
    @keyframes ai-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.7); }
    }
    .ai-error {
      font-size: 11px; color: var(--doom-hi); font-family: var(--font-mono);
      background: rgba(255,26,26,.06); border: 1px solid rgba(255,26,26,.15);
      padding: 8px 12px; border-radius: 6px;
    }
    .ai-output {
      font-size: 12px; line-height: 1.7; color: var(--text-sec);
      white-space: pre-wrap; font-family: var(--font-sans);
    }
    .ai-no-key {
      padding: 20px; border-radius: 10px;
      border: 1px solid var(--border-hi);
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-hi) 100%);
    }
    .ai-no-key-eyebrow {
      font-size: 8px; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase; font-family: var(--font-mono);
      color: var(--text-muted); margin-bottom: 8px;
    }
    .ai-no-key-heading {
      font-size: 14px; font-weight: 700; color: var(--text);
      line-height: 1.3; margin-bottom: 10px;
    }
    .ai-no-key-body {
      font-size: 12px; color: var(--text-sec); line-height: 1.65; margin-bottom: 16px;
    }
    .ai-setup-link {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600; font-family: var(--font-mono);
      padding: 7px 13px; border-radius: 6px;
      background: var(--text); color: var(--bg);
      text-decoration: none; transition: opacity 0.15s;
    }
    .ai-setup-link:hover { opacity: 0.78; }
    /* ── Footer ──────────────────────────────────────────────────────────── */
    .app-footer {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      height: 30px;
      border-top: 1px solid var(--border);
      background: var(--topbar-bg);
    }
    .app-footer a {
      font-size: 10px; font-family: var(--font-mono); font-weight: 500;
      letter-spacing: 0.04em; color: var(--text-muted);
      text-decoration: none; transition: color 0.15s;
    }
    .app-footer a:hover { color: var(--text); }

    /* ── Loading overlay (branded) ───────────────────────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .loading-box {
      display: flex; flex-direction: column; align-items: center;
      gap: 0; text-align: center;
    }
    .loading-wordmark {
      font-size: 28px; font-weight: 800; letter-spacing: -0.05em;
      color: var(--text); margin-bottom: 20px; line-height: 1;
    }
    .loading-wordmark .wm-suffix {
      font-size: 14px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--text-muted); vertical-align: super; margin-left: 2px;
    }
    .loading-bar {
      width: 200px; height: 2px; background: var(--border);
      border-radius: 2px; overflow: hidden; margin-bottom: 18px;
    }
    .loading-bar-fill {
      height: 100%; border-radius: 2px;
      background: linear-gradient(90deg, var(--doom-mid), var(--doom-lo), var(--bloom));
      animation: bar-sweep 1.8s ease-in-out infinite;
    }
    @keyframes bar-sweep {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }
    .loading-label {
      font-size: 11px; font-family: var(--font-mono); color: var(--text-muted);
      letter-spacing: 0.04em; margin-bottom: 4px;
    }
    .loading-sub {
      font-size: 10px; font-family: var(--font-mono); color: var(--text-muted);
      opacity: 0.7;
    }

    /* ── Error toast ─────────────────────────────────────────────────────── */
    .error-toast {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      z-index: 2100; background: var(--doom-hi); color: #fff;
      padding: 10px 16px; border-radius: 9px; font-size: 11px;
      font-family: var(--font-mono); display: flex; align-items: center; gap: 10px;
      max-width: 480px; animation: slide-bottom 0.2s ease;
      box-shadow: 0 4px 24px rgba(124,10,26,0.35);
    }
    .error-dismiss {
      background: none; border: none; color: rgba(255,255,255,.65);
      cursor: pointer; font-size: 14px; flex-shrink: 0; transition: color 0.1s;
    }
    .error-dismiss:hover { color: #fff; }

    /* ── Leaflet overrides ───────────────────────────────────────────────── */
    .leaflet-container { font-family: var(--font-sans); }
    .leaflet-control-zoom a {
      background: var(--bg) !important; color: var(--text) !important;
      border-color: var(--border-hi) !important; font-weight: 600 !important;
    }
    .leaflet-control-zoom a:hover { background: var(--surface) !important; }
    .leaflet-control-attribution {
      background: rgba(255,255,255,0.8) !important;
      color: var(--text-muted) !important; font-size: 9px !important;
    }
    .leaflet-tooltip {
      background: var(--bg) !important; border: 1px solid var(--border-hi) !important;
      border-radius: 6px !important; box-shadow: var(--shadow) !important;
      color: var(--text) !important; font-family: var(--font-sans) !important;
      font-size: 11px !important; padding: 5px 9px !important;
    }
    .leaflet-tooltip::before { display: none !important; }

    /* ── Map legend ──────────────────────────────────────────────────────── */
    .map-legend {
      position: absolute; bottom: 28px; right: 12px;
      z-index: 1100;
      background: var(--panel);
      border: 1px solid var(--border-hi); border-radius: 10px;
      padding: 10px 13px; box-shadow: var(--shadow-md);
      display: flex; flex-direction: column; gap: 6px;
    }
    .legend-row {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 600; color: var(--text-sec);
      font-family: var(--font-mono); letter-spacing: 0.02em;
    }
    .legend-swatch {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }

    /* ── Hope Index Visual Gauge ─────────────────────────────────────────── */
    .hope-gauge-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin: 16px 0 0;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .hope-gauge-circle {
      position: relative;
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .hope-gauge-svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    .hope-gauge-bg {
      fill: none;
      stroke: var(--border-hi);
      stroke-width: 4.5;
    }
    .hope-gauge-fill {
      fill: none;
      stroke-width: 4.5;
      stroke-linecap: round;
      transition: stroke-dasharray 0.6s ease;
    }
    .hope-gauge-value {
      position: absolute;
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }
    .hope-gauge-body {
      flex: 1;
    }
    .hope-gauge-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .hope-gauge-desc {
      font-size: 10px;
      color: var(--text-sec);
      line-height: 1.4;
    }

    /* ── Pipeline Enriched AI Summary Card ────────────────────────────────── */
    .ai-summary-box {
      background: linear-gradient(135deg, rgba(6,182,212,.03) 0%, rgba(34,197,94,.03) 100%);
      border: 1px solid rgba(6,182,212,.12);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 20px;
    }
    .ai-summary-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--theme-science);
      margin-bottom: 6px;
      font-family: var(--font-mono);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ai-summary-sparkle {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }
    .ai-summary-text {
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text);
      font-weight: 500;
    }
    .ai-summary-reasoning {
      font-size: 10.5px;
      color: var(--text-sec);
      margin-top: 6px;
      font-style: italic;
      line-height: 1.4;
    }

    /* ── Animations ──────────────────────────────────────────────────────── */
    @keyframes live-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.65); }
    }
    @keyframes btn-pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(10,10,10,0.25); }
      50%       { box-shadow: 0 0 0 9px rgba(10,10,10,0);    }
    }
    @keyframes fade-in     { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slide-right { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes slide-bottom {
      from { transform: translateX(-50%) translateY(12px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0);   opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .live-dot, .gh-btn, .pulse-ring-svg, .loading-bar-fill,
      .ai-thinking-dot { animation: none !important; }
      .detail-panel, .detail-backdrop, .error-toast   { animation: none !important; }
    }

    /* ── Mobile ──────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .topbar-stats { display: none; }
      .topbar-brand { font-size: 18px; }
      .filter-panel { width: calc(100vw - 24px); max-width: 300px; }
      .detail-panel { width: 100vw; }
      .map-legend   { display: none; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Babel standalone -->
  <script src="https://unpkg.com/@babel/standalone@7.24.0/babel.min.js"></script>

  <!-- App -->
  <script type="text/babel" data-presets="react" src="/app.js"></script>
</body>
</html>
