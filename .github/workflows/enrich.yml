name: Enrich Geopolitical Events Data

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch:      # Allow manual runs

permissions:
  contents: write         # Allows committing and pushing changes

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ML Enrichment Pipeline
        run: bun pipeline/enrich.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and Push Enriched Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/events.json public/index.html public/app.js
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update enriched geopolitical event dataset [skip ci]" && git push)
