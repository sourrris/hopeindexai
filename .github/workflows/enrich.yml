name: Enrich Geopolitical Events Data

on:
  schedule:
    - cron: '0 */2 * * *' # Every 2 hours
  workflow_dispatch:      # Allow manual runs

permissions:
  contents: write
  pull-requests: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run ML Enrichment Pipeline
        run: bun pipeline/enrich.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit Enriched Data To Update Branch
        id: commit
        run: |
          BRANCH="automation/enriched-data"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add public/data/events.json public/index.html public/app.js
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No enriched data changes to publish."
            exit 0
          fi
          git commit -m "chore: auto-update enriched geopolitical event dataset"
          git push --force-with-lease origin "$BRANCH"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open Or Update Pull Request
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="automation/enriched-data"
          if gh pr view "$BRANCH" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh pr edit "$BRANCH" \
              --repo "$GITHUB_REPOSITORY" \
              --title "chore: auto-update enriched geopolitical event dataset" \
              --body "Automated enrichment refresh. Review and merge through the normal protected-branch flow."
          else
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$BRANCH" \
              --title "chore: auto-update enriched geopolitical event dataset" \
              --body "Automated enrichment refresh. Review and merge through the normal protected-branch flow."
          fi
